<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/x-icon" href="logo.svg">
  <title>Portal Embed Tester — CityTest</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2d3148;
      --border-focus: #5b7cf6;
      --accent: #5b7cf6;
      --text: #e2e4f0;
      --text-muted: #7b7f9e;
      --text-faint: #4a4e6a;
      --green: #4ade80;
      --red: #f87171;
      --radius-sm: 6px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-size: 14px;
    }

    /* ─── Top bar ─── */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--text-muted);
      font-size: 13px;
      white-space: nowrap;
    }
    .topbar-brand:hover { color: var(--text); }
    .topbar-brand strong { color: var(--accent); }
    .topbar-sep { color: var(--text-faint); }
    .topbar-title { font-weight: 600; font-size: 14px; color: var(--text); white-space: nowrap; }

    .topbar-fields {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      flex-wrap: wrap;
    }

    .topbar label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .topbar input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 6px 10px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    .topbar input:focus { border-color: var(--border-focus); }
    .topbar input.url-input { width: 280px; }
    .topbar input.slug-input { width: 160px; }

    .load-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 7px 18px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .load-btn:hover { background: #4a68e0; }

    .clear-btn {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 7px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .clear-btn:hover { border-color: var(--red); color: var(--red); }

    .script-tag-preview {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: var(--text-faint);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 6px 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 480px;
      flex-shrink: 1;
    }

    .status-bar {
      padding: 6px 20px;
      font-size: 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      min-height: 31px;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-faint);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .status-dot.loading {
      background: #fbbf24;
      animation: pulse 1s ease-in-out infinite;
    }
    .status-dot.ok { background: var(--green); }
    .status-dot.err { background: var(--red); }

    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* ─── Portal container ─── */
    .portal-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    #portal-iframe {
      flex: 1;
      border: none;
      width: 100%;
      min-height: 600px;
      display: none;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #aaa;
    }
    .empty-state-icon { font-size: 36px; opacity: 0.3; }
    .empty-state p { font-size: 13px; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<div class="topbar">
  <a class="topbar-brand" href="index.html">← <strong>CityTest</strong></a>
  <span class="topbar-sep">/</span>
  <span class="topbar-title">Portal Embed Tester</span>

  <div class="topbar-fields">
    <label for="baseUrl">Base URL</label>
    <input id="baseUrl" class="url-input" type="url" value="https://portal.cityspark.com" />

    <label for="slug">Slug</label>
    <input id="slug" class="slug-input" type="text" placeholder="ogden" />

    <label for="basePath">Base Path</label>
    <input id="basePath" class="slug-input" type="text" value="/portal-frame.html" />

    <code class="script-tag-preview" id="scriptPreview">&lt;script src="https://portal.cityspark.com/PortalScripts/"&gt;</code>

    <button class="load-btn" onclick="loadPortal()">Load</button>
    <button class="clear-btn" onclick="clearPortal()">Clear</button>
  </div>
</div>

<div class="status-bar">
  <div class="status-dot" id="statusDot"></div>
  <span id="statusText">Enter a slug and click Load.</span>
</div>

<div class="portal-wrapper">
  <div class="empty-state" id="emptyState">
    <div class="empty-state-icon">🗓️</div>
    <p>Portal will render here</p>
  </div>
  <iframe id="portal-iframe" title="Portal Preview"></iframe>
</div>

<script>
  const baseUrlInput = document.getElementById('baseUrl');
  const slugInput = document.getElementById('slug');
  const basePathInput = document.getElementById('basePath');
  const preview = document.getElementById('scriptPreview');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const emptyState = document.getElementById('emptyState');
  const iframe = document.getElementById('portal-iframe');

  function updatePreview() {
    const base = baseUrlInput.value.replace(/\/$/, '');
    const slug = slugInput.value.trim();
    preview.textContent = `<script src="${base}/PortalScripts/${slug || '…'}">`;
  }

  baseUrlInput.addEventListener('input', updatePreview);
  slugInput.addEventListener('input', updatePreview);
  slugInput.addEventListener('keydown', e => { if (e.key === 'Enter') loadPortal(); });

  function setStatus(state, msg) {
    statusDot.className = 'status-dot' + (state ? ` ${state}` : '');
    statusText.textContent = msg;
  }

  function clearPortal() {
    iframe.onload = null;
    iframe.style.display = 'none';
    iframe.src = 'about:blank';
    emptyState.style.display = 'flex';
    setStatus('', 'Cleared.');
  }

  function loadPortal() {
    const base = baseUrlInput.value.trim().replace(/\/$/, '');
    const slug = slugInput.value.trim();
    const basePath = basePathInput.value.trim();

    if (!base) return setStatus('err', 'Base URL is required.');
    if (!slug)  return setStatus('err', 'Slug is required.');

    iframe.onload = null;
    emptyState.style.display = 'none';
    iframe.style.display = 'block';
    setStatus('loading', `Loading ${base}/PortalScripts/${slug} …`);

    const params = new URLSearchParams({ base, slug });
    if (basePath) params.set('baseUrl', basePath);
    iframe.onload = () => setStatus('ok', `Loaded ${base}/PortalScripts/${slug}`);
    iframe.src = `portal-frame.html?${params}`;
  }

  updatePreview();
</script>
</body>
</html>
