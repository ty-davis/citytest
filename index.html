<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CityTest</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-hover: #22263a;
      --border: #2d3148;
      --accent: #5b7cf6;
      --accent-dim: #3a4fa0;
      --text: #e2e4f0;
      --text-muted: #7b7f9e;
      --green: #4ade80;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 48px 40px 0;
      max-width: 960px;
      margin: 0 auto;
      width: 100%;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .logo h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .logo h1 span {
      color: var(--accent);
    }

    .tagline {
      color: var(--text-muted);
      font-size: 15px;
      margin-bottom: 48px;
    }

    main {
      flex: 1;
      max-width: 960px;
      margin: 0 auto;
      width: 100%;
      padding: 0 40px 64px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .tool-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      margin-bottom: 48px;
    }

    .tool-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }

    .tool-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), #8b5cf6);
      opacity: 0;
      transition: opacity 0.15s;
    }

    .tool-card:hover {
      background: var(--surface-hover);
      border-color: var(--accent-dim);
      transform: translateY(-2px);
    }

    .tool-card:hover::before {
      opacity: 1;
    }

    .card-icon {
      font-size: 22px;
      margin-bottom: 4px;
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    .card-desc {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .card-badge {
      margin-top: auto;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .card-badge::after {
      content: '→';
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      display: inline-block;
    }

    footer {
      border-top: 1px solid var(--border);
      padding: 20px 40px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <div class="logo-icon">🧪</div>
      <h1>City<span>Test</span></h1>
    </div>
    <p class="tagline">Internal tooling suite for testing CitySpark APIs and services.</p>
  </header>

  <main>
    <p class="section-label">API Testers</p>
    <div class="tool-grid">

      <a class="tool-card" href="portal-api.html">
        <div class="card-icon">📡</div>
        <div class="card-title">Portal API Tester</div>
        <div class="card-desc">Test all endpoints on CitySpark.Portal — GetEvents, GetEvent, auth actions, blocks, picks, and more.</div>
        <div class="card-badge"><span class="status-dot"></span> Live</div>
      </a>

    </div>
  </main>

  <footer>CityTest · Internal Use Only</footer>
</body>
</html>
