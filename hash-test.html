  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2d3148;
      --accent: #5b7cf6;
      --text: #e2e4f0;
      --text-muted: #7b7f9e;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header a {
      text-decoration: none;
      color: var(--text-muted);
      font-size: 13px;
    }
    header a:hover { color: var(--text); }
    header a strong { color: var(--accent); }

    header span { color: var(--text-muted); font-size: 13px; }
    header h1 { font-size: 14px; font-weight: 600; color: var(--text); }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 10px 20px;
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
    }
  </style>
